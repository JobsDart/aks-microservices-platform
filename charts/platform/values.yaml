# Container image (push services/sample-service to your registry).
image:
  repository: ghcr.io/jobsdart/sample-service
  tag: latest
  pullPolicy: IfNotPresent

# Defaults applied to every service unless overridden per-service below.
defaults:
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# The four bounded-context services of the CoMa platform. One image, four identities.
services:
  - name: contract
    replicas: 2
  - name: user
    replicas: 2
  - name: notification
    replicas: 2
    autoscale: true        # in production, scaled by KEDA on Service Bus queue depth (see ../keda)
  - name: integration
    replicas: 1

# Emit a Prometheus Operator ServiceMonitor per service.
metrics:
  enabled: true

# CPU-based HorizontalPodAutoscaler for services flagged autoscale: true.
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
