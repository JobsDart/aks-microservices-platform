apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coma-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JobsDart/aks-microservices-platform.git
    targetRevision: main
    path: charts/platform
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: coma
  syncPolicy:
    automated:
      prune: true        # delete resources removed from Git
      selfHeal: true     # revert manual drift back to Git state
    syncOptions:
      - CreateNamespace=true
